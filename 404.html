<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Page Not Found — AURELLE Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />
</head>
<body>

<header id="navbar" role="banner" style="position:fixed;top:0;left:0;right:0;z-index:200;padding:1.25rem 0;background:transparent;">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo"><span class="logo-main" style="color:var(--text-primary);">AURELLE</span><span class="logo-sub">Photography Studio</span></a>
    <div class="nav-actions"><div class="nav-toggle-group"><button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode"><span id="theme-icon">◑</span></button></div><a href="index.html" class="btn btn-primary btn-sm">Go Home</a></div>
  </div>
</header>

<main style="min-height:100svh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);position:relative;overflow:hidden;padding-top:90px;">
  <!-- Decorative elements -->
  <div aria-hidden="true" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;">
    <div style="position:absolute;top:-20%;left:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,0.06) 0%,transparent 70%);"></div>
    <div style="position:absolute;bottom:-20%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(216,167,177,0.06) 0%,transparent 70%);"></div>

    <!-- Floating particles -->
    <div class="particle" style="left:10%;animation-duration:12s;animation-delay:0s;width:6px;height:6px;opacity:0.4;"></div>
    <div class="particle" style="left:25%;animation-duration:15s;animation-delay:2s;width:4px;height:4px;opacity:0.3;background:var(--rose);"></div>
    <div class="particle" style="left:60%;animation-duration:18s;animation-delay:4s;width:5px;height:5px;opacity:0.35;"></div>
    <div class="particle" style="left:80%;animation-duration:13s;animation-delay:1s;width:3px;height:3px;opacity:0.3;background:var(--beige);"></div>
    <div class="particle" style="left:45%;animation-duration:20s;animation-delay:6s;width:4px;height:4px;opacity:0.4;"></div>
  </div>

  <div style="text-align:center;max-width:600px;padding:2rem;position:relative;z-index:2;animation:fadeIn 0.8s ease;">
    <!-- Giant 404 -->
    <div style="font-family:var(--font-serif);font-size:clamp(8rem,20vw,14rem);font-weight:300;line-height:0.85;color:transparent;-webkit-text-stroke:1px rgba(212,175,55,0.3);letter-spacing:-0.02em;margin-bottom:0.5rem;position:relative;animation:scaleIn 0.8s ease;">
      404
      <span class="gold-shimmer" style="position:absolute;top:0;left:0;right:0;-webkit-text-stroke:0;background-clip:text;-webkit-background-clip:text;font-size:inherit;font-weight:inherit;font-family:inherit;line-height:inherit;letter-spacing:inherit;opacity:0.15;">404</span>
    </div>

    <!-- Decorative divider -->
    <div style="width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem auto;"></div>

    <p class="eyebrow" style="margin-bottom:1.5rem;animation:fadeInUp 0.8s ease 0.2s both;">Page Not Found</p>

    <h1 style="font-family:var(--font-serif);font-size:clamp(1.75rem,4vw,2.75rem);font-weight:400;margin-bottom:1.25rem;animation:fadeInUp 0.8s ease 0.3s both;">
      Lost in the <em style="font-style:italic;color:var(--gold);">Dark Room</em>?
    </h1>

    <p style="color:var(--text-secondary);font-size:1.0625rem;line-height:1.8;margin-bottom:3rem;animation:fadeInUp 0.8s ease 0.4s both;">
      The page you're looking for seems to have wandered out of frame. Let's get you back to something beautiful.
    </p>

    <div style="display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;animation:fadeInUp 0.8s ease 0.5s both;">
      <a href="index.html" class="btn btn-primary btn-lg">← Return Home</a>
      <a href="gallery.html" class="btn btn-outline btn-lg">View Gallery</a>
      <a href="contact.html" class="btn btn-outline btn-lg">Book a Session</a>
    </div>

    <!-- Quick links -->
    <div style="margin-top:4rem;padding-top:2rem;border-top:1px solid var(--border-color);animation:fadeInUp 0.8s ease 0.6s both;">
      <p style="font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1.5rem;">Popular Pages</p>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;">
        <a href="about.html" class="badge" style="font-size:0.8rem;padding:0.5rem 1.25rem;">About Us</a>
        <a href="services.html" class="badge" style="font-size:0.8rem;padding:0.5rem 1.25rem;">Services</a>
        <a href="gallery.html" class="badge" style="font-size:0.8rem;padding:0.5rem 1.25rem;">Gallery</a>
        <a href="blog.html" class="badge" style="font-size:0.8rem;padding:0.5rem 1.25rem;">Journal</a>
        <a href="contact.html" class="badge" style="font-size:0.8rem;padding:0.5rem 1.25rem;">Contact</a>
        <a href="sitemap.html" class="badge" style="font-size:0.8rem;padding:0.5rem 1.25rem;">Sitemap</a>
      </div>
    </div>
  </div>
</main>

<script src="assets/js/main.js" defer></script>
</body>
</html>
