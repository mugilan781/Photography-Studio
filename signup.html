<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create Portal Account — AURELLE Studio. Register for exclusive client gallery access and session management." />
  <title>Create Account — AURELLE Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />
  <style>
    /* Scope body background */
    body {
      background: var(--bg-secondary) !important;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    #navbar {
      background: var(--bg-card) !important;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
    }

    /* Auth layout container */
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 4rem; /* Spacious breathing space */
    }

    .auth-card {
      width: 100%;
      max-width: 500px; /* Slightly wider for the plans layout */
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow-lg);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .auth-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-xl);
    }

    /* Badge */
    .auth-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      background: rgba(212, 175, 55, 0.08);
      color: var(--gold);
      border: 1px solid rgba(212, 175, 55, 0.25);
      margin-bottom: 1rem;
    }

    /* Input design */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .form-control {
      height: 48px;
      border-radius: var(--radius-lg) !important;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.75rem 1rem;
      font-size: 0.925rem;
      transition: all 0.3s ease;
      width: 100%;
    }

    .form-control:focus {
      background: var(--bg-card);
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12) !important;
      outline: none;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 1.75rem 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider:not(:empty)::before {
      margin-right: 1em;
    }

    .divider:not(:empty)::after {
      margin-left: 1em;
    }

    /* Social buttons */
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      height: 48px;
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      border: 1.5px solid var(--border-color);
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 100%;
    }

    .social-btn:hover {
      background: var(--bg-secondary);
      border-color: var(--text-secondary);
      transform: translateY(-1px);
    }

    /* Custom Checkbox */
    .checkbox-container {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-container input {
      display: none;
    }

    .checkbox-custom {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .checkbox-container:hover .checkbox-custom {
      border-color: var(--gold);
    }

    .checkbox-container input:checked + .checkbox-custom {
      background: var(--gold);
      border-color: var(--gold);
    }

    .checkbox-custom svg {
      color: #000000;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .checkbox-container input:checked + .checkbox-custom svg {
      opacity: 1;
    }

    /* Gold gradient button */
    .btn-gold-gradient {
      width: 100%;
      height: 48px;
      border-radius: var(--radius-lg);
      border: none;
      background: linear-gradient(135deg, #D4AF37 0%, #AA820A 100%);
      color: #000000;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(170, 130, 10, 0.2);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-gold-gradient:hover {
      background: linear-gradient(135deg, #E5C04A 0%, #BC931B 100%);
      box-shadow: 0 6px 20px rgba(170, 130, 10, 0.35);
      transform: translateY(-1px);
    }

    .btn-gold-gradient:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(170, 130, 10, 0.15);
    }

    /* Password visibility toggle btn */
    .password-toggle-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .password-toggle-btn:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>

<div id="preloader" aria-hidden="true">
  <div class="preloader-logo">AURELLE <span>Studio</span></div>
  <div class="preloader-bar"></div>
</div>

<!-- ══ NAVBAR SIMPLIFIED ═════════════════════════════════ -->
<header id="navbar" role="banner">
  <div class="container nav-inner" style="display:flex;justify-content:space-between;align-items:center;height:100%;">
    <a href="index.html" class="nav-logo" aria-label="AURELLE Studio Home">
      <span class="logo-main">AURELLE</span>
      <span class="logo-sub">Photography Studio</span>
    </a>

    <div class="nav-actions" style="display:flex;align-items:center;gap:1.25rem;">
      <button id="theme-toggle" class="theme-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
        <span id="theme-icon">◑</span>
      </button>

      <button id="rtl-toggle" class="lang-btn" title="Toggle RTL" aria-label="Toggle RTL layout">
        <span id="rtl-text">LTR</span>
      </button>
    </div>
  </div>
</header>

<!-- ══ MAIN AUTH LAYOUT ═════════════════════════════════ -->
<main class="auth-container">
  <div class="auth-card sr">
    <div style="text-align:center;margin-bottom:2rem;">
      <span class="auth-badge">Client Registration</span>
      <h1 style="font-family:var(--font-serif);font-size:2.25rem;margin-bottom:0.5rem;color:var(--text-primary);font-weight:400;">Join AURELLE</h1>
      <p style="font-size:0.875rem;color:var(--text-secondary);line-height:1.6;">Register to manage bookings and view custom photo galleries</p>
    </div>

    <!-- Social Logins -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
      <button type="button" class="social-btn" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.89h12.62c-.54 2.92-2.18 5.39-4.66 7.05l7.24 5.61C43.46 36.19 46.5 30.64 46.5 24z"/>
          <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.98-6.19z"/>
          <path fill="#34A853" d="M24 38.5c-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48c6.48 0 11.93-2.13 15.89-5.81l-7.24-5.61c-2.11 1.45-4.81 2.42-7.65 2.42z"/>
        </svg>
        <span>Google</span>
      </button>
      <button type="button" class="social-btn" id="apple-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-primary);">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.2.67-2.92 1.49-.61.7-1.15 1.84-1.01 2.96 1.12.09 2.27-.58 2.94-1.39z"/>
        </svg>
        <span>Apple</span>
      </button>
    </div>

    <div class="divider">or register with email</div>

    <form style="display:flex;flex-direction:column;gap:1.25rem;">

      <!-- First Name / Last Name Grid -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label class="form-label" for="signup-fname">First Name *</label>
          <input type="text" id="signup-fname" class="form-control" placeholder="First name" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-lname">Last Name *</label>
          <input type="text" id="signup-lname" class="form-control" placeholder="Last name" required />
        </div>
      </div>

      <!-- Email Address -->
      <div class="form-group">
        <label class="form-label" for="signup-email">Email Address *</label>
        <input type="email" id="signup-email" class="form-control" placeholder="your@email.com" required />
      </div>

      <!-- Phone Number -->
      <div class="form-group">
        <label class="form-label" for="signup-phone">Phone Number</label>
        <input type="tel" id="signup-phone" class="form-control" placeholder="+1 (555) 000-0000" />
      </div>

      <!-- Password -->
      <div class="form-group" style="margin-bottom:0.5rem;">
        <label class="form-label" for="signup-password">Password *</label>
        <div style="position:relative;width:100%;">
          <input type="password" id="signup-password" class="form-control" placeholder="At least 8 characters" required style="padding-right:2.75rem;" />
          <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <!-- Animated Password Strength progress bar -->
        <div class="strength-meter-container" style="margin-top:0.6rem;">
          <div class="strength-meter-bar-bg" style="height:4px;background:var(--border-color);border-radius:2px;overflow:hidden;width:100%;">
            <div id="strength-meter-bar" style="height:100%;width:0%;transition:width 0.3s ease, background-color 0.3s ease;border-radius:2px;"></div>
          </div>
          <div id="strength-meter-label" style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;text-align:right;font-weight:600;"></div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group" style="margin-bottom:0.75rem;">
        <label class="form-label" for="signup-confirm-password">Confirm Password *</label>
        <div style="position:relative;width:100%;">
          <input type="password" id="signup-confirm-password" class="form-control" placeholder="••••••••" required style="padding-right:2.75rem;" />
          <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
            <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <!-- Terms & Conditions checkbox -->
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label class="checkbox-container">
          <input type="checkbox" id="signup-terms" required />
          <span class="checkbox-custom">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          <span style="font-size:0.825rem;color:var(--text-secondary);line-height:1.4;">I accept the <a href="terms-conditions.html" target="_blank" style="color:var(--gold);text-decoration:none;">Terms &amp; Conditions</a> and <a href="privacy-policy.html" target="_blank" style="color:var(--gold);text-decoration:none;">Privacy Policy</a> *</span>
        </label>
      </div>

      <button type="submit" class="btn-gold-gradient">Create Account</button>
    </form>

    <div style="text-align:center;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border-color);font-size:0.875rem;color:var(--text-secondary);">
      Already have a client account? <a href="login.html" style="color:var(--gold);font-weight:600;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--gold)'">Sign In</a>
    </div>

    <div style="text-align:center;margin-top:1.25rem;">
      <a href="index.html" style="font-size:0.875rem;color:var(--text-muted);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-muted)'">← Back to Home</a>
    </div>
  </div>
</main>

<button id="back-to-top" aria-label="Back to top">↑</button>
<script src="assets/js/main.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Password visibility toggle
    document.querySelectorAll('.password-toggle-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const input = this.parentNode.querySelector('input');
        const eyeOpen = this.querySelector('.eye-open');
        const eyeClosed = this.querySelector('.eye-closed');
        if (input.type === 'password') {
          input.type = 'text';
          eyeOpen.style.display = 'none';
          eyeClosed.style.display = 'block';
        } else {
          input.type = 'password';
          eyeOpen.style.display = 'block';
          eyeClosed.style.display = 'none';
        }
      });
    });

    // Password strength logic
    const passwordInput = document.getElementById('signup-password');
    const meterBar = document.getElementById('strength-meter-bar');
    const meterLabel = document.getElementById('strength-meter-label');

    if (passwordInput && meterBar && meterLabel) {
      passwordInput.addEventListener('input', function() {
        const val = this.value;
        let score = 0;
        if (!val) {
          score = 0;
        } else {
          if (val.length >= 8) score++;
          if (/[A-Z]/.test(val)) score++;
          if (/[a-z]/.test(val)) score++;
          if (/[0-9]/.test(val)) score++;
          if (/[^A-Za-z0-9]/.test(val)) score++;
        }

        let width = '0%';
        let color = '';
        let text = '';

        if (val.length > 0) {
          switch(score) {
            case 1:
              width = '20%';
              color = '#ef4444';
              text = 'Very Weak';
              break;
            case 2:
              width = '40%';
              color = '#f97316';
              text = 'Weak';
              break;
            case 3:
              width = '60%';
              color = '#eab308';
              text = 'Medium';
              break;
            case 4:
              width = '80%';
              color = '#3b82f6';
              text = 'Strong';
              break;
            case 5:
              width = '100%';
              color = '#22c55e';
              text = 'Very Strong';
              break;
            default:
              width = '10%';
              color = '#ef4444';
              text = 'Very Weak';
          }
        }

        meterBar.style.width = width;
        meterBar.style.backgroundColor = color;
        meterLabel.textContent = text ? 'Strength: ' + text : '';
        if (text) {
          meterLabel.style.color = color;
        } else {
          meterLabel.style.color = 'var(--text-muted)';
        }
      });
    }

    // Social redirect events
    const googleBtn = document.getElementById('google-btn');
    const appleBtn = document.getElementById('apple-btn');
    if (googleBtn) {
      googleBtn.addEventListener('click', () => {
        window.location.href = "https://www.google.com";
      });
    }
    if (appleBtn) {
      appleBtn.addEventListener('click', () => {
        window.location.href = "https://www.apple.com";
      });
    }

    // Form redirection after validation
    const signupForm = document.querySelector('form');
    if (signupForm) {
      signupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        window.location.href = "index.html";
      });
    }
  });
</script>
</body>
</html>
